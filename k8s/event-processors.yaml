apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: loan-origination
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: ghcr.io/example/distributed-loan-origination/customer-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: loan-platform-config
---
