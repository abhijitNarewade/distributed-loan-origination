name: loan-platform-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build
        run: mvn -B clean verify
      - name: Upload service jars
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: "**/target/*.jar"
