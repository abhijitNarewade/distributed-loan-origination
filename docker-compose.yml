services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loan
      POSTGRES_PASSWORD: loan
      POSTGRES_DB: loan_application
    ports:
      - "${LOAN_POSTGRES_PORT:-15432}:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "${LOAN_REDIS_PORT:-26379}:6379"

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "${LOAN_KAFKA_PORT:-29092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./infra/otel/otel-collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "${LOAN_OTEL_GRPC_PORT:-24317}:4317"
      - "${LOAN_OTEL_HTTP_PORT:-24318}:4318"
      - "${LOAN_OTEL_METRICS_PORT:-28889}:8889"

  service-discovery:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: service-discovery/target/service-discovery-1.0.0-SNAPSHOT.jar
    ports:
      - "${LOAN_EUREKA_PORT:-18761}:8761"

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: api-gateway/target/api-gateway-1.0.0-SNAPSHOT.jar
    environment:
      EUREKA_URI: http://service-discovery:8761/eureka
    ports:
      - "${LOAN_GATEWAY_PORT:-18080}:8080"
    depends_on:
      - service-discovery

  application-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: application-service/target/application-service-1.0.0-SNAPSHOT.jar
    environment: &service-env
      DB_URL: jdbc:postgresql://postgres:5432/loan_application
      DB_USER: loan
      DB_PASSWORD: loan
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      EUREKA_URI: http://service-discovery:8761/eureka
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      - postgres
      - kafka
      - redis
      - service-discovery

  customer-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: customer-service/target/customer-service-1.0.0-SNAPSHOT.jar
    environment: *service-env
    depends_on:
      - kafka
      - service-discovery

  kyc-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: kyc-service/target/kyc-service-1.0.0-SNAPSHOT.jar
    environment: *service-env
    depends_on:
      - kafka
      - service-discovery

  bureau-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: bureau-service/target/bureau-service-1.0.0-SNAPSHOT.jar
    environment: *service-env
    depends_on:
      - kafka
      - service-discovery

  risk-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: risk-service/target/risk-service-1.0.0-SNAPSHOT.jar
    environment: *service-env
    depends_on:
      - kafka
      - service-discovery

  approval-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: approval-service/target/approval-service-1.0.0-SNAPSHOT.jar
    environment:
      <<: *service-env
      DB_URL: jdbc:postgresql://postgres:5432/loan_approval
    depends_on:
      - postgres
      - kafka
      - service-discovery

  disbursement-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        JAR_FILE: disbursement-service/target/disbursement-service-1.0.0-SNAPSHOT.jar
    environment: *service-env
    depends_on:
      - kafka
      - service-discovery
